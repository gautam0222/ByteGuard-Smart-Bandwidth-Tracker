<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ByteGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="dark-theme">
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <h1>ByteGuard<span class="logo-version">v1.0</span></h1>
        </div>
        <div class="header-actions">
          <div class="live-indicator">
            <span class="live-dot"></span>
            <span>LIVE</span>
          </div>
          <button id="themeToggle" class="icon-btn" title="Toggle theme">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
          </button>
          <button id="refreshBtn" class="icon-btn" title="Refresh data">
            <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Hero Stat -->
    <div class="stats-section">
      <div class="hero-stat animate-in">
        <div class="hero-left">
          <div class="hero-label">Today's Usage</div>
          <div class="hero-value" id="todayUsage">
            <span class="loading-skeleton">Loading</span>
          </div>
          <div class="hero-change" id="usageChange">--</div>
        </div>
        <div class="progress-ring-wrapper">
          <svg class="progress-ring" width="64" height="64" viewBox="0 0 64 64">
            <circle class="progress-ring-bg" cx="32" cy="32" r="27"/>
            <circle class="progress-ring-fill" id="progressRing" cx="32" cy="32" r="27"
                    stroke-dasharray="169.65" stroke-dashoffset="169.65"/>
          </svg>
          <div class="progress-ring-text" id="progressPercent">0%</div>
        </div>
      </div>

      <!-- Metrics Grid -->
      <div class="metrics-grid">
        <div class="metric-card animate-in" style="animation-delay:0.05s">
          <div class="metric-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          </div>
          <div class="metric-label">Budget Left</div>
          <div class="metric-value" id="budgetLeft">
            <span class="loading-skeleton">--</span>
          </div>
        </div>
        <div class="metric-card animate-in" style="animation-delay:0.1s">
          <div class="metric-icon">
            <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
          </div>
          <div class="metric-label">Network</div>
          <div class="metric-value" id="networkInfo">
            <span class="loading-skeleton">--</span>
          </div>
        </div>
        <div class="metric-card animate-in" style="animation-delay:0.15s">
          <div class="metric-icon">
            <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div class="metric-label">Speed</div>
          <div class="metric-value" id="speedDisplay">
            <span class="loading-skeleton">--</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Budget Progress Bar -->
    <div class="budget-bar-section animate-in" style="animation-delay:0.2s">
      <div class="budget-header">
        <span class="budget-label">Daily Budget</span>
        <span class="budget-amount" id="budgetMax">0 / 500 MB</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-section">
      <div class="control-card animate-in" style="animation-delay:0.25s">
        <div class="control-left">
          <div class="control-icon shield">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div class="control-info">
            <div class="control-title">Low-Data Mode</div>
            <div class="control-desc" id="lowDataDesc">Save up to 90% bandwidth</div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="lowDataToggle">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
      <div class="control-card animate-in" style="animation-delay:0.3s">
        <div class="control-left">
          <div class="control-icon">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </div>
          <div class="control-info">
            <div class="control-title">Smart Alerts</div>
            <div class="control-desc">Sound + notification</div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="alertsToggle" checked>
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
    </div>

    <!-- Category Tabs -->
    <div class="category-section animate-in" style="animation-delay:0.35s">
      <div class="category-tabs">
        <button class="category-tab active" data-category="all">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </span>
          <span class="tab-label">All</span>
        </button>
        <button class="category-tab" data-category="social">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <span class="tab-label">Social</span>
        </button>
        <button class="category-tab" data-category="work">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          </span>
          <span class="tab-label">Work</span>
        </button>
        <button class="category-tab" data-category="media">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </span>
          <span class="tab-label">Media</span>
        </button>
      </div>
    </div>

    <!-- Sites List -->
    <div class="sites-section">
      <div class="section-header">
        <div class="section-title">
          <h3>Top Data Users</h3>
          <span class="site-count" id="sitesCount">0 sites</span>
        </div>
        <button id="speedTestBtn" class="action-btn">
          <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span>Speed Test</span>
        </button>
      </div>
      <div id="sitesList" class="sites-list">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
          <p>No data yet. Start browsing!</p>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="nav-section">
      <button id="settingsBtn" class="nav-btn">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </span>
        <span class="nav-label">Settings</span>
      </button>
      <button id="chartsBtn" class="nav-btn">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </span>
        <span class="nav-label">Analytics</span>
      </button>
      <button id="helpBtn" class="nav-btn">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </span>
        <span class="nav-label">Help</span>
      </button>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
