<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — ByteGuard</title>
  <link rel="stylesheet" href="options.css">
</head>
<body class="dark-theme">
  <div class="container">
    <header>
      <div class="header-left">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <div>
          <h1>ByteGuard Settings</h1>
          <p class="header-sub">Configure your bandwidth tracker</p>
        </div>
      </div>
    </header>

    <main>
      <section class="settings-section">
        <div class="section-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          <h2>Data Budgets</h2>
        </div>

        <div class="setting-item">
          <label for="dailyBudget">Daily Budget (MB)</label>
          <input type="number" id="dailyBudget" min="50" step="50" value="500" placeholder="500">
        </div>

        <div class="setting-item">
          <label for="monthlyBudget">Monthly Budget (GB)</label>
          <input type="number" id="monthlyBudget" min="1" step="1" value="10" placeholder="10">
        </div>
      </section>

      <section class="settings-section">
        <div class="section-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <h2>Alerts</h2>
        </div>

        <div class="setting-item">
          <label for="alertThreshold">Alert at (% of budget)</label>
          <input type="number" id="alertThreshold" min="50" max="100" step="5" value="90">
        </div>

        <div class="setting-item checkbox-wrap">
          <label class="checkbox-label">
            <input type="checkbox" id="autoLowData" checked>
            <span class="checkmark"></span>
            <span>Auto-enable Low-Data Mode at 90% budget</span>
          </label>
          <p class="help-text">Automatically blocks images and videos when approaching your limit</p>
        </div>
      </section>

      <section class="settings-section">
        <div class="section-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <h2>Data Management</h2>
        </div>
        <button id="clearDataBtn" class="btn-danger">Clear All Data</button>
        <p class="help-text">This will reset all usage statistics and settings</p>
      </section>

      <section class="settings-section">
        <div class="section-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <h2>Export & Backup</h2>
        </div>

        <div class="export-grid">
          <button id="exportJSONBtn" class="btn-export">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <div>
              <span>Export JSON</span>
              <small>Full backup</small>
            </div>
          </button>

          <button id="exportCSVBtn" class="btn-export">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <div>
              <span>Export CSV</span>
              <small>Spreadsheet</small>
            </div>
          </button>

          <button id="generateSummaryBtn" class="btn-export">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <div>
              <span>Weekly Report</span>
              <small>HTML summary</small>
            </div>
          </button>
        </div>

        <div class="import-section">
          <h3>Import Data</h3>
          <input type="file" id="importFileInput" accept=".json" style="display: none;">
          <button id="importBtn" class="btn-export full-width">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div>
              <span>Import from JSON</span>
              <small>Restore a backup file</small>
            </div>
          </button>
        </div>
      </section>

      <section class="settings-section">
        <div class="section-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          <h2>Blocked Domains</h2>
        </div>
        <div id="blockedDomainsList" class="blocked-list">
          <p class="empty-msg">No blocked domains</p>
        </div>
      </section>

      <button id="saveBtn" class="btn-primary">Save Settings</button>
      <div id="toastContainer" class="toast-container"></div>
    </main>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
