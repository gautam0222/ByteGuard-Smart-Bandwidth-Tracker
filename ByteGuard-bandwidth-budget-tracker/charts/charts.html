<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — ByteGuard</title>
  <link rel="stylesheet" href="charts.css">
</head>
<body class="dark-theme">
  <div class="container">
    <header>
      <div class="header-left">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <h1>Usage Analytics</h1>
      </div>
      <button id="backBtn" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </button>
    </header>

    <div class="stats-summary">
      <div class="stat-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <div class="stat-content">
          <span class="stat-label">Today</span>
          <span class="stat-value" id="todayTotal">0 B</span>
        </div>
      </div>
      <div class="stat-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <div class="stat-content">
          <span class="stat-label">7-Day Avg</span>
          <span class="stat-value" id="weekAverage">0 B</span>
        </div>
      </div>
      <div class="stat-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <div class="stat-content">
          <span class="stat-label">Status</span>
          <span class="stat-value" id="budgetStatus">On Track</span>
        </div>
      </div>
      <div class="stat-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <div class="stat-content">
          <span class="stat-label">Top Site</span>
          <span class="stat-value" id="topSite">None</span>
        </div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <h2>Daily Usage Trend</h2>
          <select id="trendPeriod" class="period-selector">
            <option value="7">7 Days</option>
            <option value="14">14 Days</option>
            <option value="30">30 Days</option>
          </select>
        </div>
        <div class="chart-container"><canvas id="dailyTrendChart"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <h2>Top Sites</h2>
          <span class="chart-sub">By data consumption</span>
        </div>
        <div class="chart-container"><canvas id="topSitesChart"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <h2>Budget Progress</h2>
          <span class="chart-sub">Daily vs Monthly</span>
        </div>
        <div class="chart-container"><canvas id="budgetProgressChart"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <h2>Usage by Hour</h2>
          <span class="chart-sub">Peak usage times</span>
        </div>
        <div class="chart-container"><canvas id="hourlyUsageChart"></canvas></div>
      </div>
    </div>

    <div class="insights-section">
      <h2>Insights & Recommendations</h2>
      <div id="insightsList" class="insights-list">
        <div class="insight-card">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <p>Loading insights...</p>
        </div>
      </div>
    </div>
  </div>
  <script src="../lib/chart.js"></script>
  <script type="module" src="charts.js"></script>
</body>
</html>
